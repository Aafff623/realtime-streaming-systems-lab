<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qiyu Live README Preview</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css"
    />
    <link rel="stylesheet" href="./preview-readme.css" />
  </head>
  <body>
    <header class="toolbar">
      <div>
        <strong>Qiyu Live</strong>
        <span>README Preview</span>
      </div>
      <button id="reload" type="button">重新加载</button>
    </header>
    <div id="status" class="status" role="status">正在加载 README.md</div>
    <main id="content" class="markdown-body"></main>
    <footer>本地预览端口 4173。请通过 HTTP 打开此页面。</footer>

    <script>
      window.__PREVIEW_README__ = {
        language: "zh-CN",
        title: "Qiyu Live README Preview",
        source: "./README.md",
        fileProtocolMessage:
          "file:// 无法读取 README.md。请运行 python -m http.server 4173。",
        loadErrorMessage: "README 加载失败，请检查本地 HTTP 服务和网络连接。",
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="./preview-readme.js"></script>
  </body>
</html>
